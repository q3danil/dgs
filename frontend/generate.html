<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генерация данных</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <a href="index.html" class="back-link"><span>&lt;</span> Назад</a>

    <div class="wizard-wrapper">
        <!-- Для единообразия оставляем пустую левую зону, можно убрать -->
        <div class="cards-container">
            <h1 class="step-title">1. Генерация данных</h1>
            <div class="step-card">
                <form id="genForm">
                    <div class="form-group">
                        <label>Количество строк (rows)</label>
                        <input type="number" id="rowsCount" value="50" min="1" max="1000" required>
                    </div>
                    <div class="form-group">
                        <label>Настройка полей данных</label>
                        <div id="fieldsList" class="fields-container"></div>
                        <button type="button" class="btn-add" onclick="addField()">+ Добавить колонку</button>
                    </div>
                    <button type="submit" class="btn-generate">Генерировать</button>
                </form>
            </div>
        </div>
    </div>

    <div id="loaderOverlay" class="loader-overlay">
        <div class="spinner"></div>
        <p>Идет генерация данных...</p>
        <p class="small">Пожалуйста, подождите</p>
    </div>

    <script src="scripts/common.js"></script>
    <script src="scripts/generate.js"></script>
</body>
</html>
